name: Bug report
description: Report something broken, confusing, slow, or misleading.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. The best bug report shows the exact journey, the visible result, and what you expected instead.
  - type: textarea
    id: journey
    attributes:
      label: What happened?
      description: Describe the exact keys or tmux plugin action you used.
      placeholder: "Example: opened muxboard with prefix+M, pressed Enter on a Codex pane, then Esc..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      placeholder: "Example: Output should close and return to the same selected pane."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions and terminal context.
      value: |
        muxboard:
        tmux:
        OS:
        terminal:
        local or SSH:
        tmux plugin mode, if any:
    validations:
      required: true
  - type: textarea
    id: screen
    attributes:
      label: Screen capture or output
      description: Paste a screenshot, terminal capture, or the visible text if possible.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Quick checks
      options:
        - label: I searched existing issues and discussions.
        - label: I can reproduce this on the latest release or current main.
