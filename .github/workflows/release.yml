name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux
            runner: ubuntu-latest
          - name: macos
            runner: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke release binary
        run: target/release/muxboard --version

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-manual}"
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"
          mkdir -p dist
          cp target/release/muxboard "dist/muxboard-${version}-${os}-${arch}"
          shasum -a 256 "dist/muxboard-${version}-${os}-${arch}" > "dist/muxboard-${version}-${os}-${arch}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muxboard-${{ matrix.target.name }}
          path: dist/*
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --title "muxboard ${GITHUB_REF_NAME}" --notes-file CHANGELOG.md
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
